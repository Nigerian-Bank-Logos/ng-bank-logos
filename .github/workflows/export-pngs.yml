name: Export PNGs from SVGs

on:
  push:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run export script
        run: node scripts/export-pngs.js

      - name: Commit and push output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add logos/ dist/
          git diff --staged --quiet || git commit -m "chore: auto-export PNGs and update live_banks JSON"
          git push

      - name: Purge jsDelivr cache for banks JSON files
        run: |
          for file in dist/banks_*.json; do
            filename=$(basename "$file")
            curl -s "https://purge.jsdelivr.net/gh/Nigerian-Bank-Logos/ng-bank-logos@main/dist/${filename}" > /dev/null
            echo "Purged: $filename"
          done
